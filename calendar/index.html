<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Calendar</title>

<style>
body {
  margin: 0;
  background: white;
  color: #111;
  font-family: Helvetica, Arial, sans-serif;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 4rem 2rem;
}

.back {
  color: #777;
  text-decoration: none;
}

.back:hover {
  color: #111;
}

h1 {
  font-weight: 400;
  margin-top: 3rem;
  margin-bottom: 3rem;
}

.event {
  display: flex;
  gap: 1rem;
  padding: 1rem 0;
  border-bottom: 1px solid #eee;
}

.color {
  width: 12px;
  height: 12px;
  margin-top: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.office { background: #4A90E2; }
.wfh { background: #27AE60; }
.leave { background: #E74C3C; }
.holiday { background: #F4D03F; }

.title {
  font-size: 1rem;
}

.date {
  color: #666;
  font-size: 0.9rem;
  margin-top: 0.3rem;
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="/">← Home</a>

<h1>Working Calendar</h1>

<div id="events">
Loading...
</div>

</div>

<script>

function formatDate(dateString) {
  const date = new Date(dateString);

  return date.toLocaleDateString("en-GB", {
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}

fetch("/content/calendar.json")
  .then(response => response.json())
  .then(events => {

    events.sort((a,b) =>
      new Date(b.start) - new Date(a.start)
    );

    const container =
      document.getElementById("events");

    container.innerHTML = "";

    events.forEach(event => {

      const div =
        document.createElement("div");

      div.className = "event";

      div.innerHTML = `
        <div class="color ${event.type}"></div>

        <div>
          <div class="title">
            ${event.title}
          </div>

          <div class="date">
            ${formatDate(event.start)}
            –
            ${formatDate(event.end)}
          </div>
        </div>
      `;

      container.appendChild(div);

    });

  });

</script>

</body>
</html>
