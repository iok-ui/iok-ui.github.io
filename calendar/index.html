<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Working Calendar</title>

<style>
body {
  margin: 0;
  background: white;
  color: #111;
  font-family: Helvetica, Arial, sans-serif;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 4rem 2rem;
}

.back {
  color: #777;
  text-decoration: none;
}

h1 {
  font-weight: 400;
  margin: 3rem 0 2rem;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}

button {
  background: none;
  border: 1px solid #ddd;
  border-radius: 999px;
  padding: 0.5rem 1rem;
  font-size: 1rem;
}

.month-title {
  font-size: 1.4rem;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-top: 1px solid #eee;
  border-left: 1px solid #eee;
}

.day-name,
.day {
  border-right: 1px solid #eee;
  border-bottom: 1px solid #eee;
  padding: 0.7rem;
  min-height: 110px;
  box-sizing: border-box;
}

.day-name {
  min-height: auto;
  color: #777;
  font-size: 0.85rem;
}

.date {
  font-size: 0.85rem;
  color: #777;
  margin-bottom: 0.5rem;
}

.event {
  font-size: 0.75rem;
  color: white;
  border-radius: 6px;
  padding: 0.25rem 0.4rem;
  margin-bottom: 0.25rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.office     { background: #2E7D32; }   /* green */
.wfh        { background: #9E9E9E; }   /* grey */
.leave      { background: #F2994A; }   /* orange */
.holiday    { background: #FC8EAC; }   /* flamingo pink */
.conference { background: #4285F4; }   /* blue */
.other      { background: #999999; }

@media (max-width: 700px) {
  .container {
    padding: 3rem 1rem;
  }

  .day {
    min-height: 85px;
    padding: 0.35rem;
  }

  .event {
    font-size: 0.65rem;
  }
}
</style>
</head>

<body>
<div class="container">
  <a class="back" href="/">← Home</a>

  <h1>Working Calendar</h1>

  <div class="controls">
    <button onclick="changeMonth(-1)">←</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<script>
let events = [];
let currentDate = new Date();

const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function formatMonth(date) {
  return date.toLocaleDateString("en-GB", {
    month: "long",
    year: "numeric"
  });
}

function dateToString(date) {
  return date.toISOString().split("T")[0];
}

function isEventOnDate(event, dateString) {
  return event.start <= dateString && dateString < event.end;
}

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  const monthTitle = document.getElementById("monthTitle");

  calendar.innerHTML = "";
  monthTitle.textContent = formatMonth(currentDate);

  dayNames.forEach(day => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.textContent = day;
    calendar.appendChild(div);
  });

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement("div");
    empty.className = "day";
    calendar.appendChild(empty);
  }

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(year, month, day);
    const dateString = dateToString(date);

    const cell = document.createElement("div");
    cell.className = "day";

    cell.innerHTML = `<div class="date">${day}</div>`;

    events
      .filter(event => isEventOnDate(event, dateString))
      .forEach(event => {
        const eventDiv = document.createElement("div");
        eventDiv.className = `event ${event.type || "other"}`;
        eventDiv.textContent = event.title;
        cell.appendChild(eventDiv);
      });

    calendar.appendChild(cell);
  }
}

function changeMonth(step) {
  currentDate.setMonth(currentDate.getMonth() + step);
  renderCalendar();
}

fetch("/content/calendar.json")
  .then(response => response.json())
  .then(data => {
    events = data;
    renderCalendar();
  });
</script>
</body>
</html>
