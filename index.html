<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iok-ui Tiunn</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      color: #111111;
      font-family: Helvetica, Arial, sans-serif;
    }

    main {
      text-align: center;
    }

    #logo {
      font-size: 6rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }

    .name {
      font-size: 1.4rem;
      margin-bottom: 0.8rem;
    }

    .tagline {
      font-size: 1rem;
      color: #555555;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <main>
    <div id="logo">i</div>

    <div class="name">Io̍k-uí Tiunn</div>

    <div class="tagline">
      Brain networks · Data science · Neuroimaging · Software
    </div>
  </main>

  <script>
  const logo = document.getElementById("logo");

  const sequence = [
    { text: "i", delay: 300 },
    { text: "io", delay: 160 },
    { text: "iok", delay: 160 },
    { text: "iok-", delay: 160 },
    { text: "iok-u", delay: 160 },
    { text: "iok-uí", delay: 1000 },
    { text: "ok-uí", delay: 120 },
    { text: "k-uí", delay: 120 },
    { text: "-uí", delay: 120 },
    { text: "uí", delay: 120 },
    { text: "í", delay: 120 }
  ];

  let index = 0;

  function animateLogo() {
    logo.textContent = sequence[index].text;

    const delay = sequence[index].delay;
    index++;

    if (index < sequence.length) {
      setTimeout(animateLogo, delay);
    }
  }

  setTimeout(animateLogo, 500);
</script>
</body>
</html>
