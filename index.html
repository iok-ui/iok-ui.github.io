<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Io̍k-uí Tiunn</title>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: Helvetica, Arial, sans-serif;
    }

    .landing {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main {
      text-align: center;
    }

    #logo {
      font-size: 6rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }

    .name {
      font-size: 1.4rem;
      margin-bottom: 0.8rem;
    }

    .tagline {
      font-size: 1rem;
      color: #555555;
      line-height: 1.6;
    }

    .link {
      display: inline-block;
      margin-top: 4rem;
      font-size: 0.85rem;
      color: #777777;
      text-decoration: none;
    }

    .link:hover {
      color: #111111;
    }
  </style>
</head>

<body>
  <section class="landing">
    <main>
      <div id="logo">i</div>

      <div class="name">Io̍k-uí Tiunn</div>

      <div class="tagline">
        Brain networks · Data science · Neuroimaging · Software
      </div>

      <a class="link" href="/calendar/">Working calendar ↓</a>
    </main>
  </section>

  <script>
    const logo = document.getElementById("logo");

    const sequence = [
      { text: "i", delay: 600 },
      { text: "io", delay: 160 },
      { text: "iok", delay: 160 },
      { text: "iok-", delay: 160 },
      { text: "iok-u", delay: 160 },
      { text: "iok-uí", delay: 1200 },
      { text: "ok-uí", delay: 120 },
      { text: "k-uí", delay: 120 },
      { text: "-uí", delay: 120 },
      { text: "uí", delay: 120 },
      { text: "í", delay: 120 }
    ];

    let index = 0;

    function animateLogo() {
      logo.textContent = sequence[index].text;
      const delay = sequence[index].delay;
      index++;

      if (index < sequence.length) {
        setTimeout(animateLogo, delay);
      }
    }

    setTimeout(animateLogo, 500);
  </script>
</body>
</html>
