<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brain Graph</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  color: #111111;
  font-family: Helvetica, Arial, sans-serif;
}

.container {
  padding: 3rem 4vw;
}

.back {
  color: #777;
  text-decoration: none;
}

.back:hover {
  color: #111;
}

h1 {
  font-weight: 400;
  margin: 3rem 0 0.5rem;
}

.note {
  color: #666;
  margin-bottom: 2rem;
  max-width: 720px;
  line-height: 1.6;
}

#scene {
  width: 100%;
  height: 75vh;
  border: 1px solid #eeeeee;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  background: #fafafa;
}

.tooltip {
  position: absolute;
  display: none;
  background: white;
  border: 1px solid #eeeeee;
  border-radius: 16px;
  padding: 1rem;
  max-width: 300px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  pointer-events: none;
  z-index: 10;
}

.tooltip-title {
  font-size: 1rem;
  margin-bottom: 0.4rem;
}

.tooltip-text {
  font-size: 0.85rem;
  color: #666;
  line-height: 1.5;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: 1.5rem;
  color: #666;
  font-size: 0.85rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

@media (max-width: 700px) {
  .container {
    padding: 3rem 1rem;
  }

  #scene {
    height: 65vh;
  }
}
</style>
</head>

<body>
<div class="container">
  <a class="back" href="/">← Home</a>

  <h1>Brain Graph</h1>

  <p class="note">
    A 3D Desikan brain graph. Nodes represent cortical regions; edges sketch possible network connections.
    Drag to rotate, scroll or pinch to zoom, and click a node to keep its information open.
  </p>

  <div id="scene">
    <div class="tooltip" id="tooltip">
      <div class="tooltip-title" id="tooltipTitle"></div>
      <div class="tooltip-text" id="tooltipText"></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#2E7D32"></span>Frontal</div>
    <div class="legend-item"><span class="legend-dot" style="background:#4285F4"></span>Temporal</div>
    <div class="legend-item"><span class="legend-dot" style="background:#F2994A"></span>Parietal</div>
    <div class="legend-item"><span class="legend-dot" style="background:#9B59B6"></span>Occipital / visual</div>
    <div class="legend-item"><span class="legend-dot" style="background:#FC8EAC"></span>Limbic / cingulate / insula</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const sceneElement = document.getElementById("scene");
const tooltip = document.getElementById("tooltip");
const tooltipTitle = document.getElementById("tooltipTitle");
const tooltipText = document.getElementById("tooltipText");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  55,
  sceneElement.clientWidth / sceneElement.clientHeight,
  0.1,
  3000
);

camera.position.set(0, -180, 120);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(sceneElement.clientWidth, sceneElement.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
sceneElement.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = true;
controls.enableZoom = true;
controls.rotateSpeed = 0.65;
controls.zoomSpeed = 0.8;
controls.panSpeed = 0.7;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.target.set(0, 0, 0);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.4);
directionalLight.position.set(120, -160, 200);
scene.add(directionalLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 1.3);
scene.add(ambientLight);

const nodeGroup = new THREE.Group();
const edgeGroup = new THREE.Group();

scene.add(edgeGroup);
scene.add(nodeGroup);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let nodes = [];
let nodeMeshes = [];
let pinnedNode = null;
let pinnedMesh = null;

function regionInfo(label) {
  const text = String(label || "").toLowerCase();

  if (text.includes("frontal")) {
    return "Often linked to executive control, planning, decision-making, working memory, and goal-directed behaviour.";
  }

  if (text.includes("precentral")) {
    return "Primary motor region involved in voluntary movement and motor planning.";
  }

  if (text.includes("postcentral")) {
    return "Primary somatosensory region involved in body sensation.";
  }

  if (text.includes("temporal")) {
    return "Associated with auditory processing, memory, language, semantic processing, and social cognition.";
  }

  if (text.includes("parietal") || text.includes("supramarginal") || text.includes("precuneus")) {
    return "Associated with spatial attention, sensory integration, multimodal processing, and body-space representation.";
  }

  if (
    text.includes("occipital") ||
    text.includes("cuneus") ||
    text.includes("lingual") ||
    text.includes("pericalcarine")
  ) {
    return "Associated with visual processing, shape perception, and scene-related information.";
  }

  if (text.includes("cingulate")) {
    return "Associated with cognitive control, attention, emotion, memory, and default-mode network functions.";
  }

  if (text.includes("insula")) {
    return "Associated with interoception, salience, emotion, bodily awareness, and integration of internal states.";
  }

  if (text.includes("entorhinal") || text.includes("parahippocampal")) {
    return "Associated with memory, spatial context, and medial temporal lobe processing.";
  }

  if (text.includes("fusiform")) {
    return "Associated with face, object, and high-level visual recognition.";
  }

  return "Cortical region from the Desikan atlas.";
}

function colourByRegion(node) {
  const label = String(node.label || node.displayLabel || "").toLowerCase();

  if (label.includes("frontal")) return 0x2E7D32;

  if (label.includes("temporal")) return 0x4285F4;

  if (
    label.includes("parietal") ||
    label.includes("supramarginal") ||
    label.includes("precuneus")
  ) return 0xF2994A;

  if (
    label.includes("occipital") ||
    label.includes("cuneus") ||
    label.includes("lingual") ||
    label.includes("pericalcarine")
  ) return 0x9B59B6;

  if (
    label.includes("cingulate") ||
    label.includes("insula") ||
    label.includes("entorhinal") ||
    label.includes("parahippocampal") ||
    label.includes("fusiform")
  ) return 0xFC8EAC;

  return 0x999999;
}

function normaliseNodes(rawNodes) {
  const parsed = rawNodes.map(node => ({
    ...node,
    x: Number(node.x),
    y: Number(node.y),
    z: Number(node.z)
  }));

  const center = new THREE.Vector3();

  parsed.forEach(node => {
    center.x += node.x;
    center.y += node.y;
    center.z += node.z;
  });

  center.divideScalar(parsed.length);

  parsed.forEach(node => {
    node.x -= center.x;
    node.y -= center.y;
    node.z -= center.z;
  });

  let maxDistance = 1;

  parsed.forEach(node => {
    const distance = Math.sqrt(node.x ** 2 + node.y ** 2 + node.z ** 2);
    maxDistance = Math.max(maxDistance, distance);
  });

  const scale = 85 / maxDistance;

  parsed.forEach(node => {
    node.x *= scale;
    node.y *= scale;
    node.z *= scale;
  });

  return parsed;
}

function makeNode(node) {
  const geometry = new THREE.SphereGeometry(2.8, 28, 28);

  const material = new THREE.MeshStandardMaterial({
    color: 0xd8d8d8,
    transparent: true,
    opacity: 0.28,
    roughness: 0.55,
    metalness: 0.02
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(node.x, node.y, node.z);
  mesh.userData = {
    ...node,
    originalColor: colourByRegion(node),
    baseColor: 0xd8d8d8
  };

  nodeGroup.add(mesh);
  nodeMeshes.push(mesh);
}

function makeEdge(a, b, opacity = 0.18) {
  const points = [
    new THREE.Vector3(a.x, a.y, a.z),
    new THREE.Vector3(b.x, b.y, b.z)
  ];

  const geometry = new THREE.BufferGeometry().setFromPoints(points);

  const material = new THREE.LineBasicMaterial({
    color: 0xd0d0d0,
    transparent: true,
    opacity: 0.06
  });

  const line = new THREE.Line(geometry, material);
  line.userData = {
    source: a,
    target: b
  };
  edgeGroup.add(line);
}

function createEdges() {
  const left = nodes.filter(node => node.hemisphere === "left");
  const right = nodes.filter(node => node.hemisphere === "right");

  left.sort((a, b) => a.index - b.index);
  right.sort((a, b) => a.index - b.index);

  for (let i = 0; i < left.length - 1; i++) {
    makeEdge(left[i], left[i + 1], 0.14);
  }

  for (let i = 0; i < right.length - 1; i++) {
    makeEdge(right[i], right[i + 1], 0.14);
  }

  for (let i = 0; i < Math.min(left.length, right.length); i += 4) {
    makeEdge(left[i], right[i], 0.20);
  }

  for (let i = 0; i < nodes.length; i += 6) {
    const a = nodes[i];
    const b = nodes[(i + 11) % nodes.length];
    makeEdge(a, b, 0.10);
  }
}

async function addBrainSurface() {
  const response = await fetch("/content/brain-surface.json");
  const surface = await response.json();

  const vertices = new Float32Array(surface.vertices.flat());
  const indices = new Uint32Array(surface.faces.flat());

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
  geometry.setIndex(new THREE.BufferAttribute(indices, 1));
  geometry.computeVertexNormals();

  geometry.center();

  const box = new THREE.Box3().setFromBufferAttribute(
    geometry.getAttribute("position")
  );

  const size = new THREE.Vector3();
  box.getSize(size);

  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 165 / maxDim;

  geometry.scale(scale, scale, scale);

  const material = new THREE.MeshStandardMaterial({
    color: 0xdedede,
    transparent: true,
    opacity: 0.08,
    roughness: 0.8,
    metalness: 0.0,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geometry, material);

  mesh.rotation.x = 0;
  mesh.rotation.y = 0;
  mesh.rotation.z = 0;

  scene.add(mesh);
}

function showTooltip(node, x, y) {
  tooltip.style.display = "block";
  tooltip.style.left = `${x + 18}px`;
  tooltip.style.top = `${y + 18}px`;

  tooltipTitle.textContent = node.displayLabel || node.label;
  tooltipText.textContent = regionInfo(node.label || node.displayLabel);
}

function hideTooltip() {
  if (!pinnedNode) {
    tooltip.style.display = "none";
  }
}

function getIntersections(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  return {
    hits: raycaster.intersectObjects(nodeMeshes),
    rect
  };
}

function resetNodeScales() {
  nodeMeshes.forEach(mesh => {
    mesh.scale.set(1, 1, 1);
  });
}

function screenPositionOf(vector3, rect) {
  const projected = vector3.clone();
  projected.project(camera);

  return {
    x: (projected.x * 0.5 + 0.5) * rect.width,
    y: (-projected.y * 0.5 + 0.5) * rect.height
  };
}

function resetVisuals() {
  nodeMeshes.forEach(mesh => {
    mesh.scale.set(1, 1, 1);
    mesh.material.color.setHex(0xd8d8d8);
    mesh.material.opacity = 0.28;
  });

  edgeGroup.children.forEach(edge => {
    edge.material.color.setHex(0xd0d0d0);
    edge.material.opacity = 0.06;
  });
}

function lightUpAroundPointer(pointerX, pointerY, rect) {
  const radius = 115;

  nodeMeshes.forEach(mesh => {
    const pos = screenPositionOf(mesh.position, rect);

    const dx = pos.x - pointerX;
    const dy = pos.y - pointerY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < radius) {
      const strength = 1 - distance / radius;

      mesh.material.color.setHex(mesh.userData.originalColor);
      mesh.material.opacity = 0.28 + strength * 0.72;
      mesh.scale.setScalar(1 + strength * 0.75);
    }
  });

  edgeGroup.children.forEach(edge => {
    const source = new THREE.Vector3(
      edge.userData.source.x,
      edge.userData.source.y,
      edge.userData.source.z
    );

    const target = new THREE.Vector3(
      edge.userData.target.x,
      edge.userData.target.y,
      edge.userData.target.z
    );

    const a = screenPositionOf(source, rect);
    const b = screenPositionOf(target, rect);

    const midpointX = (a.x + b.x) / 2;
    const midpointY = (a.y + b.y) / 2;

    const dx = midpointX - pointerX;
    const dy = midpointY - pointerY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < radius) {
      const strength = 1 - distance / radius;

      edge.material.color.setHex(0x999999);
      edge.material.opacity = 0.06 + strength * 0.32;
    }
  });
}

function onPointerMove(event) {
  if (pinnedNode) return;

  const rect = renderer.domElement.getBoundingClientRect();

  const pointerX = event.clientX - rect.left;
  const pointerY = event.clientY - rect.top;

  mouse.x = (pointerX / rect.width) * 2 - 1;
  mouse.y = -(pointerY / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  resetVisuals();
  lightUpAroundPointer(pointerX, pointerY, rect);

  const hits = raycaster.intersectObjects(nodeMeshes);

  if (hits.length > 0) {
    const mesh = hits[0].object;
    const node = mesh.userData;

    mesh.material.color.setHex(mesh.userData.originalColor);
    mesh.material.opacity = 1;
    mesh.scale.setScalar(1.8);

    showTooltip(node, pointerX, pointerY);
    controls.autoRotate = false;
  } else {
    tooltip.style.display = "none";
  }
}

function onClick(event) {
  const { hits, rect } = getIntersections(event);

  resetNodeScales();
  resetVisuals();

  if (hits.length > 0) {
    const mesh = hits[0].object;
    pinnedMesh = mesh;
    pinnedNode = mesh.userData;

    resetVisuals();

    mesh.material.color.setHex(mesh.userData.originalColor);
    mesh.material.opacity = 1;
    mesh.scale.set(1.9, 1.9, 1.9);

    showTooltip(
      pinnedNode,
      event.clientX - rect.left,
      event.clientY - rect.top
    );

    controls.autoRotate = false;
  } else {
    pinnedNode = null;
    pinnedMesh = null;
    tooltip.style.display = "none";
  }
}

function onPointerLeave() {
  if (!pinnedNode) {
    tooltip.style.display = "none";
    resetVisuals();
  }
}

async function loadGraph() {
  const response = await fetch("/content/desikan-nodes.json");
  const data = await response.json();

  nodes = normaliseNodes(data.nodes || data);

  nodes.forEach(makeNode);
  createEdges();
  addBrainSurface();
}

function resize() {
  camera.aspect = sceneElement.clientWidth / sceneElement.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(sceneElement.clientWidth, sceneElement.clientHeight);
}

function animate() {
  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);
}

renderer.domElement.addEventListener("pointermove", onPointerMove);
renderer.domElement.addEventListener("pointerleave", onPointerLeave);
renderer.domElement.addEventListener("click", onClick);

window.addEventListener("resize", resize);

loadGraph();
animate();
</script>
</body>
</html>
